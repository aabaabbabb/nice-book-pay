<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title th:text="${order != null ? order.hotelName : '付款结果'}">付款结果</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0">
<link rel="stylesheet" href="/assets/css/weui.css" />
<link rel="stylesheet" href="/assets/css/weuix.css" />
</head>
<body ontouchstart class="page-bg">
    <div class="page-hd" th:if="${order != null}">
        <h1 class="page-hd-title" th:text="${order.hotelName}">酒店名称</h1>
        <p class="page-hd-desc">订单号：<span th:text="${order.orderid}">-</span></p>
    </div>

    <div class="page-bd" style="background-color: #F8F8F8">
        <div class="weui-msg" th:if="${order != null and order.payState == 3}">
            <div class="weui-msg__icon-area">
                <i class="weui-icon-success weui-icon_msg"></i>
            </div>
            <div class="weui-msg__text-area">
                <h2 class="weui-msg__title">支付成功</h2>
                <p class="weui-msg__desc">订单金额：<span th:text="${order.payprice}">0</span></p>
            </div>
        </div>

        <div class="weui-msg" th:if="${order != null and order.payState == 2}">
            <div class="weui-msg__icon-area">
                <i class="weui-icon-warn weui-icon_msg"></i>
            </div>
            <div class="weui-msg__text-area">
                <h2 class="weui-msg__title">待付款</h2>
                <p class="weui-msg__desc">此订单尚未付款，请返回付款页面继续处理。</p>
            </div>
            <div class="weui-msg__opr-area">
                <p class="weui-btn-area">
                    <a class="weui-btn weui-btn_primary" th:href="@{'/pay/' + ${orderId}}">返回付款页</a>
                </p>
            </div>
        </div>

        <div class="weui-msg" th:if="${order == null or (order.payState != 2 and order.payState != 3)}">
            <div class="weui-msg__icon-area">
                <i class="weui-icon-warn weui-icon_msg"></i>
            </div>
            <div class="weui-msg__text-area">
                <h2 class="weui-msg__title">操作失败</h2>
                <p class="weui-msg__desc">未找到有效订单或当前订单状态无效。</p>
            </div>
        </div>

        <div class="weui-panel weui-panel_access" th:if="${order != null}">
            <div class="weui-panel__hd">订单明细</div>
            <div class="weui-panel__bd">
                <div class="weui-form-preview__bd">
                    <div class="weui-form-preview__item">
                        <label class="weui-form-preview__label">房型</label>
                        <span class="weui-form-preview__value" th:text="${order.roomName}">-</span>
                    </div>
                    <div class="weui-form-preview__item">
                        <label class="weui-form-preview__label">房间数</label>
                        <span class="weui-form-preview__value" th:text="${order.roomNum}">0</span>
                    </div>
                    <div class="weui-form-preview__item">
                        <label class="weui-form-preview__label">入住离店</label>
                        <span class="weui-form-preview__value" th:text="|${order.checkIn} - ${order.checkOut}|">-</span>
                    </div>
                    <div class="weui-form-preview__item">
                        <label class="weui-form-preview__label">姓名</label>
                        <span class="weui-form-preview__value" th:text="${order.guest}">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
