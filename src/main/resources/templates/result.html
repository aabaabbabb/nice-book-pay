<html>
<head>
<meta charset="utf-8">
<title></title>
<meta name="viewport"
	content="width=device-width,initial-scale=1,user-scalable=0">
<link rel="stylesheet" href="/assets/css/weui.css" />
<link rel="stylesheet" href="/assets/css/weuix.css" />

<script src="/assets/js/zepto.min.js"></script>
</head>
<body ontouchstart>

	#if(order!=null&&order.paystate==3)
	<div class="weui-msg">
		<div class="weui-msg__icon-area">
			<i class="weui-icon-success weui-icon_msg"></i>
		</div>
		<div class="weui-msg__text-area">
			<h2 class="weui-msg__title">支付成功</h2>
		</div>
		<div class="weui-msg__opr-area">
			<p class="weui-btn-area">
				<a href="javascript:;" class="weui-btn weui-btn_default">查看订单</a>
			</p>
		</div>
		<div class="weui-msg__extra-area"></div>
	</div>
	#else if(order!=null&&order.paystate==2)
	<div class="weui-msg">
		<div class="weui-msg__icon-area">
			<i class="weui-icon-warn  weui-icon_msg"></i>
		</div>
		<div class="weui-msg__text-area">
			<h2 class="weui-msg__title">操作失败</h2>
		</div>
		<div class="weui-msg__opr-area">
			<p class="weui-btn-area">
				<a href="javascript:;" class="weui-btn weui-btn_default">查看订单</a>
			</p>
		</div>
		<div class="weui-msg__extra-area"></div>
	</div>
	#else
	<div class="weui-msg">
		<div class="weui-msg__icon-area">
			<i class="weui-icon-warn  weui-icon_msg"></i>
		</div>
		<div class="weui-msg__text-area">
			<h2 class="weui-msg__title">操作失败</h2>
			<p>订单创建中,请稍后</p>
		</div>
		<div class="weui-msg__extra-area"></div>
	</div>
	#end
</body>
